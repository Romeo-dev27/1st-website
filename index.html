<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bouquet pour mon amour</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="kicker">Pour Lydiaaa</p>
        <h1>
          Un bouquet blanc et rouge, parce que tu aimes ces couleurs dans les fleurs.
        </h1>
        <p class="intro">
          Clique sur les fleurs et fais tomber une pluie de
          petales.
        </p>
      </section>

      <section class="experience">
        <div class="scene" id="scene">
          <div class="halo halo-left"></div>
          <div class="halo halo-right"></div>
          <div class="sparkle-layer" id="sparkleLayer"></div>
          <div class="petal-rain" id="petalRain"></div>
          <div class="shadow"></div>

          <div class="bouquet" id="bouquet">
            <div class="flowers" id="flowers"></div>
            <div class="bouquet-paper"></div>
            <div class="bouquet-paper inner"></div>

            <div class="ribbon">
              <span class="tail tail-left"></span>
              <span class="tail tail-right"></span>
              <span class="knot"></span>
            </div>
          </div>
        </div>

        <aside class="note-panel">
          <button class="love-button" id="surpriseBtn" type="button">
            Fais pleuvoir les petales
          </button>
          <button class="love-button secondary" id="messageBtn" type="button">
            Ouvre mon message
          </button>

          <div class="love-note" id="loveNote">
            <p>Lylylylylydiaaaaa</p>
            <p>T'es la meilleuuuseeee!! changee paaaass </p>
            <p>Zdg Zdg Zdg</p>
          </div>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
